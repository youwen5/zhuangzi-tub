<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zhuangzi Beats the Tub</title>
  </head>
  <body>
    <main id="app">
      <canvas id="scene" aria-label="A 3D scene of Zhuangzi beating a tub after his wife's death"></canvas>
      <section class="hud" aria-label="Story controls">
        <div class="story-copy">
          <p class="kicker">A courtyard after mourning</p>
          <h1>Zhuangzi Beats the Tub</h1>
          <p id="storyText">
            His wife lies nearby. Zhuangzi answers grief with rhythm:
            not coldness, but a stubborn little song for transformation.
          </p>
        </div>
        <div class="controls">
          <button id="beatButton" type="button" aria-label="Beat the tub">
            <span aria-hidden="true">♪</span>
            Beat tub
          </button>
          <button id="seasonButton" type="button" aria-label="Turn the season">
            <span aria-hidden="true">↻</span>
            Turn season
          </button>
        </div>
      </section>
      <aside class="caption" aria-live="polite">
        <strong id="captionTitle">Late night</strong>
        <span id="captionText">The tub waits like a very sincere drum with terrible acoustics.</span>
      </aside>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
